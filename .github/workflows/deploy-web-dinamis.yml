name: Deploy Web Dinamis to AWS EC2

on:
  push:
    branches: [main]
    paths:
      - "web-dinamis/**"
      - ".github/workflows/deploy-web-dinamis.yml"
  workflow_dispatch: # ← bisa trigger manual dari GitHub

jobs:
  build-and-deploy-web-dinamis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./web-dinamis
          file: ./web-dinamis/Dockerfile
          push: true
          no-cache: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/uasweb_dinamis:latest

  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: build-and-deploy-web-dinamis
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy Compose file to EC2 via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          port: 22
          source: "web-dinamis/docker-compose.yml,web-dinamis/db_data/uas47.sql"
          target: "/home/ubuntu/container-dinamis/uasweb-dinamis"
          strip_components: 1

      - name: Deploy Web Dinamis via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/ubuntu/container-dinamis/uasweb-dinamis
            docker pull 13raihanakbar/uasweb_dinamis:latest
            docker compose down || true
            DOCKERHUB_USERNAME=13raihanakbar docker compose up -d --remove-orphans
            docker image prune -af
            echo "=== Status Container ==="
            docker compose ps
