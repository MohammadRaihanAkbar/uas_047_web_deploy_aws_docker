name: Deploy Web Application (Statis & Dinamis) to AWS EC2

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Web Statis image
      uses: docker/build-push-action@v5
      with:
        context: ./web-statis
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/compro_2388010047:latest

    - name: Build and push Web Dinamis image
      uses: docker/build-push-action@v5
      with:
        context: ./web-dinamis
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/web-dinamis:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Copy Compose and SQL files via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ${{ secrets.AWS_USERNAME }}
        key: ${{ secrets.AWS_PRIVATE_KEY }}
        port: 22
        source: "web-dinamis/docker-compose.yml,web-dinamis/db_data/uas47.sql"
        target: "/home/ubuntu/uas_rai"
        strip_components: 1

    - name: SSH and Deploy via Docker Compose
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ${{ secrets.AWS_USERNAME }}
        key: ${{ secrets.AWS_PRIVATE_KEY }}
        port: 22
        script: |
          cd /home/ubuntu/uas_rai
          
          # Stop legacy standalone container if running
          sudo docker stop uas_047_web_deploy_aws_docker || true
          sudo docker rm uas_047_web_deploy_aws_docker || true
          
          # Pull and restart compose services
          sudo DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} docker compose pull
          sudo DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} docker compose down || true
          sudo DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} docker compose up -d