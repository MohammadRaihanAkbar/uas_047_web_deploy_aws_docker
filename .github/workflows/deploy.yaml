name: Deploy Web Statis to AWS EC2

on:
  push:
    branches: [ main ]
    paths:
      - 'web-statis/**'
      - '.github/workflows/deploy.yaml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Web Statis image
        uses: docker/build-push-action@v5
        with:
          context: ./web-statis
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/uas_047_web_deploy_aws_docker:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Web Statis via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          port: 22
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/uas_047_web_deploy_aws_docker:latest
            docker rm -f container-statis || true
            docker run -d \
              --name container-statis \
              -p 80:80 \
              --restart always \
              ${{ secrets.DOCKERHUB_USERNAME }}/uas_047_web_deploy_aws_docker:latest
            echo "=== Status ==="
            docker ps