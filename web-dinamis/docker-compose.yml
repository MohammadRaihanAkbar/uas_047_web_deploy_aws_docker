services:

  db-webdinamis:
    image: mariadb:lts
    environment:
      MARIADB_ROOT_PASSWORD: password!123
      MARIADB_DATABASE: uas47
      MARIADB_USER: RaihanUAS
      MARIADB_PASSWORD: 12345
    volumes:
      - db_data:/var/lib/mysql
      - ./db_data/uas47.sql:/docker-entrypoint-initdb.d/uas47.sql
