      DB_HOST: db-webdinamis
      DB_USER: RaihanUAS
      DB_PASSWORD: 12345
      DB_NAME: uas47
      NEXTAUTH_URL: http://54.251.155.162:3000
      NEXTAUTH_SECRET: superrahasiabanget12345678901234
    depends_on:
      - db-webdinamis

volumes:
  db_data: {}